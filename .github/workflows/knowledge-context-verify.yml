name: Knowledge Context verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify Knowledge Context contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements-dev.txt

      - name: Run v0 hygiene, fixture verification, and roundtrip checks
        run: |
          make hygiene
          make verify
          make roundtrip

      - name: Generate and verify v1 fixtures
        run: |
          make fixtures-v1
          make verify-v1
          make roundtrip-v1

      - name: Ensure generated fixture files are committed and deterministic
        run: |
          if [ -n "$(git status --porcelain -- fixtures/knowledge_store_v1_vectors_hex_pathA.txt fixtures/knowledge_store_v1_vectors_hex_pathA.txt.nonces)" ]; then
            echo "Generated v1 fixture files are missing or stale. Run make fixtures-v1 and commit the resulting files."
            git status --porcelain -- fixtures/knowledge_store_v1_vectors_hex_pathA.txt fixtures/knowledge_store_v1_vectors_hex_pathA.txt.nonces
            git diff -- fixtures/knowledge_store_v1_vectors_hex_pathA.txt fixtures/knowledge_store_v1_vectors_hex_pathA.txt.nonces || true
            exit 1
          fi
