apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prophet-k3s-missing-class
  annotations:
    socioprophet.io/platform: k3s
spec:
  rules:
    - host: k3s-missing-class.example.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prophet-k3s
                port:
                  number: 80
