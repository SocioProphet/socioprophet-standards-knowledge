apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-k3s-ingress
  annotations:
    socioprophet.io/platform: k3s
spec:
  rules:
    - host: sample-k3s.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-k3s-service
                port:
                  number: 80
